---
# CD4PE Deployment Policy Configuration
# Reference: https://help.puppet.com/cd4pe/latest/topics/deployment_policies.html

spec_version: v1

config:
  enable_pull_requests_from_forks: false
  deployment_policy_branch: production
  enable_pe_plans: true

pipelines:
  # Feature branch pattern: auto-validate and deploy to feature environment
  /feature_.*/: 
    triggers:
      - pull_request
      - commit
    stages:
      - name: "Lint/Parser validation"
        auto_promote: all_succeeded
        steps:
          - type: job
            name: control-repo-puppetfile-syntax-validate
          - type: job
            name: control-repo-template-syntax-validate

      - name: "Deploy feature environment"
        auto_promote: false
        steps:
          - type: deployment
            pe_server: cdpe-delivery
            policy: feature_branch

  # Main/production branch: full validation, impact analysis, and staged deployment
  main:
    triggers:
      - pull_request
      - commit
    stages:
      - name: "Lint/Parser validation"
        auto_promote: all_succeeded
        steps:
          - type: job
            name: control-repo-puppetfile-syntax-validate
          - type: job
            name: control-repo-template-syntax-validate
          - type: job
            name: control-repo-hiera-syntax-validate
          - type: job
            name: control-repo-manifest-validate

      - name: "Impact Analysis"
        auto_promote: any_succeeded
        steps:
          - type: impact_analysis
            concurrent_compilations: 10
            deployments:
              - "Direct merge to Staging"
              - "Canary Deploy to Production"
          - type: pull_request_gate

      - name: "Deploy to Staging"
        auto_promote: false
        steps:
          - type: deployment
            policy: direct_merge
            name: "Direct merge to Staging"
            target:
              type: node_group
              node_group_name: staging
            pe_server: cdpe-delivery
            parameters:
              stop_if_nodes_fail: 5
              noop: false
              timeout: 120

      - name: "Production Approval Gate"
        auto_promote: false
        steps:
          - type: pull_request_gate
            require_approval: true
            approvers:
              - role: infrastructure-lead
              - role: change-advisory-board

      - name: "Deploy to Production (Canary)"
        auto_promote: false
        steps:
          - type: deployment
            name: "Canary Deploy to Production"
            policy:
              source: control-repo
              name: deployments::canary
            target:
              type: node_group
              node_group_name: production
            pe_server: cdpe-delivery
            parameters:
              noop: false
              canary_size: 5
              max_node_failure: 10
              timeout: 300

      - name: "Full Production Deployment"
        auto_promote: false
        steps:
          - type: deployment
            name: "Full Production Deploy"
            policy: direct_merge
            target:
              type: node_group
              node_group_name: production
            pe_server: cdpe-delivery
            parameters:
              noop: false
              timeout: 300
